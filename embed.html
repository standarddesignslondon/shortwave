  const lh=(bot-top)/Math.max(lanes.length,1);
  lanes.forEach((k,i)=>{const y0=top+i*lh,y1=top+(i+1)*lh;
    if(k==='eibi'){const i0=lb(EIBI,FMIN),i1=EIBI.length;for(let j=i0;j<i1;j++){const e=EIBI[j];if(state.onNow&&!eibiAct(e,N))continue;const x=X(e[0]);cx.strokeStyle=e[5]?'rgba(100,116,139,.5)':'rgba(59,130,246,.55)';cx.beginPath();cx.moveTo(x,y0+2);cx.lineTo(x,y1-2);cx.stroke();}}
    else if(k==='cc'){cx.strokeStyle='rgba(163,230,53,.7)';for(let j=0;j<CC.length;j++){const x=X(CC[j][0]);cx.beginPath();cx.moveTo(x,y0+2);cx.lineTo(x,y1-2);cx.stroke();}}
    else if(k==='spec'){for(let j=0;j<SPEC.length;j++){const e=SPEC[j];if(state.onNow&&!specAct(e,N))continue;const x=X(e[0]);cx.strokeStyle=SPECCOL[e[2]]||'#f43f5e';cx.beginPath();cx.moveTo(x,y0+2);cx.lineTo(x,y1-2);cx.stroke();}}
    else if(k==='strange'){const cy=(y0+y1)/2;for(const it of STR){const col=CAT[it[4]]||'#fff';if(it[1]==='r'){const a=X(Math.max(it[2][0],FMIN)),b=X(Math.min(it[2][1],FMAX));cx.fillStyle=col;cx.globalAlpha=.32;cx.fillRect(a,cy-3,Math.max(b-a,2),6);cx.globalAlpha=1;}else{const x=X(it[2]);cx.fillStyle=col;cx.beginPath();cx.arc(x,cy,2.6,0,7);cx.fill();}}}
  });
  // marker + catch band
  const f=state.marker,k=1+state.catch,xa=X(f/k),xb=X(f*k),x=X(f);
  cx.fillStyle='rgba(255,255,255,.08)';cx.fillRect(xa,top,xb-xa,bot-top);
  cx.strokeStyle='#fff';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(x,top);cx.lineTo(x,bot);cx.stroke();cx.lineWidth=1;
  document.getElementById('freq').textContent=fmt(f);
}

function nearest(){
  const f=state.marker,k=1+state.catch,fa=f/k,fb=f*k,N=nowP();const hits=[];
  if(state.layers.strange)for(const it of STR){let hit=it[1]==='r'?(it[2][1]>=fa&&it[2][0]<=fb):(it[2]>=fa&&it[2]<=fb);if(hit)hits.push([Math.abs((it[1]==='r'?it[2][0]:it[2])-f),it[0],(it[1]==='r'?it[2][0]:it[2])]);}
  if(state.layers.spec)for(let i=lb(SPEC,fa);i<lb(SPEC,fb);i++){const e=SPEC[i];if(state.onNow&&!specAct(e,N))continue;hits.push([Math.abs(e[0]-f),e[1],e[0]]);}
  if(state.layers.cc)for(let i=lb(CC,fa);i<lb(CC,fb);i++)hits.push([Math.abs(CC[i][0]-f),CC[i][1],CC[i][0]]);
  if(state.layers.eibi)for(let i=lb(EIBI,fa);i<lb(EIBI,fb);i++){const e=EIBI[i];if(state.onNow&&!eibiAct(e,N))continue;hits.push([Math.abs(e[0]-f),e[1],e[0]]);}
  hits.sort((a,b)=>a[0]-b[0]);
  const el=document.getElementById('near');
  if(!hits.length){el.innerHTML='<span style="color:#5b6b88">nothing within ±'+(state.catch*100).toFixed(1)+'%</span>';return;}
  el.innerHTML=hits.slice(0,4).map(h=>'<b>'+h[2]+'</b> '+esc(h[1])).join(' &nbsp;·&nbsp; ');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function refresh(){draw();nearest();}

// ---- public API (called by Max via window.max.bindInlet, or for testing) ----
function setDial(kHz){const v=parseFloat(kHz);if(isFinite(v)&&v>0){state.marker=Math.min(FMAX,Math.max(FMIN,v));refresh();}}
window.setDial=setDial;

// ---- Max bridge ----
if(HASMAX){
  window.max.bindInlet('freq', setDial);
  window.max.bindInlet('layer', (name,on)=>{ if(name in state.layers){state.layers[name]=!!on; syncChips(); refresh();} });
  window.max.outlet && window.max.outlet('ready');
}
// click / drag to tune (works standalone and in Max -> sends 'tune')
function pointerToFreq(ev){const r=cv.getBoundingClientRect();const xx=(ev.clientX-r.left);return Math.min(FMAX,Math.max(FMIN,Finv(xx)));}
let down=false;
cv.addEventListener('pointerdown',e=>{down=true;const f=pointerToFreq(e);setDial(f);if(HASMAX)window.max.outlet('tune',Math.round(f*1000)/1000);});
cv.addEventListener('pointermove',e=>{if(!down)return;const f=pointerToFreq(e);setDial(f);if(HASMAX)window.max.outlet('tune',Math.round(f*1000)/1000);});
window.addEventListener('pointerup',()=>{down=false;});

// chips
function chip(id,key){const el=document.getElementById(id);el.onclick=()=>{state.layers[key]=!state.layers[key];el.classList.toggle('off',!state.layers[key]);if(HASMAX)window.max.outlet('layer',key,state.layers[key]?1:0);refresh();};}
function syncChips(){for(const [id,key] of [['c-strange','strange'],['c-spec','spec'],['c-cc','cc'],['c-eibi','eibi']])document.getElementById(id).classList.toggle('off',!state.layers[key]);
  document.getElementById('c-now').classList.toggle('off',!state.onNow);}
chip('c-strange','strange');chip('c-spec','spec');chip('c-cc','cc');chip('c-eibi','eibi');
document.getElementById('c-now').onclick=function(){state.onNow=!state.onNow;this.classList.toggle('off',!state.onNow);refresh();};

function tickUtc(){const n=new Date();document.getElementById('utc').textContent=String(n.getUTCHours()).padStart(2,'0')+':'+String(n.getUTCMinutes()).padStart(2,'0')+'z';}
tickUtc();setInterval(()=>{tickUtc();if(state.onNow)refresh();},30000);
window.addEventListener('resize',resize);
syncChips();resize();
</script>
</body>
